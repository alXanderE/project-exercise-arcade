<!DOCTYPE html>
<html lang="en">
<head>
    <title>Google Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="buttonDiv"></div> 

    <script>
        function handleCredentialResponse(response) {
            // This is your JWT
            console.log("Encoded JWT ID token: " + response.credential);
            
            // Send this to your Vercel /api/auth endpoint
            fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential })
            })
            .then(res => res.json())
            .then(data => alert("Logged in as: " + data.user.email))
            .catch(err => console.error("Server error:", err));
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "387811960660-c9aach6o1vn1uibifuodcediq2uofgqn.apps.googleusercontent.com",
                callback: handleCredentialResponse,
                ux_mode: "popup" // Use popup to avoid redirect origin issues
            });

            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "outline", size: "large" } 
            );
        }
    </script>
</body>
</html>
